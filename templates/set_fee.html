<!DOCTYPE html>
<html>
<head>
    <title>Set Course Fee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>💰 Set Course Fee</h4>
        </div>

        <div class="card-body">

            <!-- Flash Message -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">

                <label>Select Course</label>
                <select name="course_id" class="form-select mb-3" required>
                    <option value="">-- Select Course --</option>
                    {% for c in courses %}
                    <option value="{{ c.course_id }}">
                        {{ c.course_name }}
                    </option>
                    {% endfor %}
                </select>

                <label>Total Fee</label>
                <input type="number" name="total_fee" class="form-control mb-3" placeholder="Enter Total Fee" required>

                <button class="btn btn-primary">Save Fee</button>
                <a href="/admin_dashboard" class="btn btn-secondary">Back</a>

            </form>

        </div>
    </div>
</div>

</body>
</html>
