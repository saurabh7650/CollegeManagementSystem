<!DOCTYPE html>
<html>
<head>
    <title>Add Faculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Add Faculty</h3>

    <form method="post">
        <input class="form-control mb-2" name="name" placeholder="Faculty Name" required>
        <input class="form-control mb-2" name="email" placeholder="Email" required>
        <input class="form-control mb-2" name="password" placeholder="Password" required>

        <label>Department</label>
        <select class="form-control mb-2" name="department_id">
            {% for d in departments %}
            <option value="{{ d.department_id }}">{{ d.department_name }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-success">Register Faculty</button>
        <a href="/admin_dashboard" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
