<!DOCTYPE html>
<html>
<head>
    <title>Edit Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>Edit Faculty Subject Assignment</h3>

    <form method="post">

        <div class="mb-3">
            <label class="form-label">Faculty</label>
            <select name="faculty_id" class="form-control">
                {% for f in faculty %}
                <option value="{{ f.faculty_id }}"
                    {% if f.faculty_id == assignment.faculty_id %}selected{% endif %}>
                    {{ f.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <select name="subject_id" class="form-control">
                {% for s in subjects %}
                <option value="{{ s.subject_id }}"
                    {% if s.subject_id == assignment.subject_id %}selected{% endif %}>
                    {{ s.subject_name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <button class="btn btn-success">Update</button>
        <a href="/admin/view_assigned_subjects" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
