<!DOCTYPE html>
<html>
<head>
    <title>Student Fee Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h3 class="mb-3">📊 Student Fee Details</h3>

    <table class="table table-bordered table-striped">
        <tr class="table-dark">
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
            <th>Total Fee</th>
            <th>Paid</th>
            <th>Pending</th>
            <th>Action</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ s.roll_no }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.course_name }}</td>

            <td>₹{{ s.total_fee }}</td>
            <td class="text-success">₹{{ s.paid }}</td>
            <td class="text-danger">₹{{ s.pending }}</td>

            <td>
                <a href="/admin/add_payment/{{ s.student_id }}" class="btn btn-success btn-sm">
                    Add Payment
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/admin_dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
