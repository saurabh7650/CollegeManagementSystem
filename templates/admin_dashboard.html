<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🎓 College Admin Panel</span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="mb-4">Welcome, Admin</h3>

    <div class="row">

        <!-- Students -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h4>👨‍🎓 Student Management</h4>
                    <a href="/admin/add_student" class="btn btn-primary mt-2">Add Student</a>
                    <a href="/admin/view_students" class="btn btn-outline-primary mt-2">View Students</a>
                </div>
            </div>
        </div>

        <!-- Faculty -->
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">
                    <h4>👨‍🏫 Faculty Management</h4>
                    <a href="/admin/add_faculty" class="btn btn-success mt-2">Add Faculty</a>
                    <a href="/admin/view_faculty" class="btn btn-outline-success mt-2">View Faculty</a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
