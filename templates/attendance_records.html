<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h3 class="mb-3">My Attendance Records</h3>

    <div class="card shadow">
        <div class="card-body">

            {% if records %}
            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Date</th>
                        <th>Course</th>
                        <th>Subject</th>
                        <th>Roll No</th>
                        <th>Student Name</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in records %}
                    <tr>
                        <td>{{ r.date }}</td>
                        <td>{{ r.course_name }}</td>
                        <td>{{ r.subject_name }}</td>
                        <td>{{ r.roll_no }}</td>
                        <td>{{ r.student_name }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
                <p class="text-muted">No attendance records found.</p>
            {% endif %}

        </div>
    </div>

    <a href="/faculty_dashboard" class="btn btn-secondary mt-3">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
