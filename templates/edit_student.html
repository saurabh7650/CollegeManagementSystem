<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Edit Student</h3>

    <form method="post">
    <input class="form-control mb-2" name="name" value="{{ student.name }}" required>
    <input class="form-control mb-2" name="roll" value="{{ student.roll_no }}" required>
    <input class="form-control mb-2" name="address" value="{{ student.address }}">

    <label>Department</label>
    <select class="form-control mb-2" name="department_id">
        {% for d in departments %}
        <option value="{{ d.department_id }}"
        {% if d.department_id == student.department_id %}selected{% endif %}>
        {{ d.department_name }}
        </option>
        {% endfor %}
    </select>

    <label>Course</label>
    <select class="form-control mb-2" name="course_id">
        {% for c in courses %}
        <option value="{{ c.course_id }}"
        {% if c.course_id == student.course_id %}selected{% endif %}>
        {{ c.course_name }}
        </option>
        {% endfor %}
    </select>

    <button class="btn btn-success">Update</button>
    <a href="/admin/view_students" class="btn btn-secondary">Back</a>
</form>
</div>

</body>
</html>
