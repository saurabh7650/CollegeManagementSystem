<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Edit Student</h3>

    <form method="post">
        <input class="form-control mb-2" name="name" value="{{ student.name }}" required>
        <input class="form-control mb-2" name="roll" value="{{ student.roll_no }}" required>
        <input class="form-control mb-2" name="email" value="{{ student.email }}" required>

        <button class="btn btn-success">Update</button>
        <a href="/admin/view_students" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
