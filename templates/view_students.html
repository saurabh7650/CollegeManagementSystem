<!doctype html>
<html>
  <head>
    <title>Students</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <h3>All Students</h3>

      <form method="get" class="mb-3">
        <div class="input-group">
          <input
            class="form-control"
            name="search"
            placeholder="Search by Roll or Name"
          />
          <button class="btn btn-dark">Search</button>
          <a href="/admin/view_students" class="btn btn-secondary">Reset</a>
        </div>
      </form>

      <table class="table table-bordered table-striped">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Course</th>
          <th>Roll</th>
          <th>Photo</th>
          <th>QR</th>
          <th>Action</th>
        </tr>

        {% for s in students %}
        <tr>
          <td>{{ s.student_id }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.department_name }}</td>
          <td>{{ s.course_name }}</td>
          <td>{{ s.roll_no }}</td>
          <td>
            {% if s.photo %}<img src="/{{ s.photo }}" width="50" />{% endif %}
          </td>
          <td>
            {% if s.qr_code %}<img src="/{{ s.qr_code }}" width="50" />{% endif
            %}
          </td>
          <td>
            <a
              class="btn btn-warning btn-sm"
              href="/admin/edit_student/{{ s.student_id }}"
              >Edit</a
            >
            <a
              class="btn btn-danger btn-sm"
              href="/admin/delete_student/{{ s.student_id }}"
              onclick="return confirm('Delete?');"
              >Delete</a
            >
          </td>
        </tr>
        {% endfor %}
      </table>

      <a href="/admin_dashboard" class="btn btn-secondary">Back</a>
    </div>
  </body>
</html>
