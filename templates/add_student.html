<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Add Student</h3>

    <form method="post">
        <input class="form-control mb-2" name="name" placeholder="Student Name" required>
        <input class="form-control mb-2" name="roll" placeholder="Roll No" required>
        <input class="form-control mb-2" name="address" placeholder="Address">
        <input class="form-control mb-2" name="password" placeholder="Password" required>

        <label>Department</label>
        <select class="form-control mb-2" name="department_id">
            {% for d in departments %}
            <option value="{{ d.department_id }}">{{ d.department_name }}</option>
            {% endfor %}
        </select>

        <label>Course</label>
        <select class="form-control mb-2" name="course_id">
            {% for c in courses %}
            <option value="{{ c.course_id }}">{{ c.course_name }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-primary">Register Student</button>
        <a href="/admin_dashboard" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
