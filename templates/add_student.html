<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Add Student</h3>

    <form method="post">
        <input class="form-control mb-2" name="name" placeholder="Student Name" required>
        <input class="form-control mb-2" name="roll" placeholder="Roll No" required>
        <input class="form-control mb-2" name="email" placeholder="Email" required>
        <input class="form-control mb-2" name="password" placeholder="Password" required>

        <button class="btn btn-primary">Register Student</button>
        <a href="/admin_dashboard" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
