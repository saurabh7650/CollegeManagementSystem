<!DOCTYPE html>
<html>
<head>
    <title>Edit Faculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h3>Edit Faculty</h3>

    <form method="post">
        <input class="form-control mb-2" name="name" value="{{ faculty.name }}" required>
        <input class="form-control mb-2" name="email" value="{{ faculty.email }}" required>
        
        <label>Department</label>
        <select class="form-control mb-2" name="department_id">
            {% for d in departments %}
            <option value="{{ d.department_id }}"
            {% if d.department_id == faculty.department_id %}selected{% endif %}>
            {{ d.department_name }}
            </option>
            {% endfor %}
        </select>

        <button class="btn btn-success">Update</button>
        <a href="/admin/view_faculty" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
