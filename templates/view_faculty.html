<!DOCTYPE html>
<html>
<head>
    <title>View Faculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>All Faculty</h3>

    <form method="get" class="mb-3">
        <div class="input-group">
            <input class="form-control" name="search" placeholder="Search by Name or Subject">
            <button class="btn btn-dark">Search</button>
            <a href="/admin/view_faculty" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <table class="table table-bordered table-striped">
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Action</th>
        </tr>

        {% for f in faculty %}
        <tr>
            <td>{{ f.faculty_id }}</td>
            <td>{{ f.name }}</td>
            <td>{{ f.email }}</td>
            <td>{{ f.subject }}</td>
            <td>
                <a class="btn btn-warning btn-sm" href="/admin/edit_faculty/{{ f.faculty_id }}">Edit</a>
                <a class="btn btn-danger btn-sm"
                   href="/admin/delete_faculty/{{ f.faculty_id }}"
                   onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="/admin_dashboard" class="btn btn-secondary">Back</a>
</div>

</body>
</html>
