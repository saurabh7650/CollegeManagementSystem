<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .hero {
      background-color: #f8f9fa;
      padding: 60px 0;
      text-align: center;
    }
    .contact-info {
      background-color: #e9ecef;
      padding: 30px;
      border-radius: 10px;
    }
    .footer {
      background-color: #343a40;
      color: white;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand">Contact Us</a>
    <form class="d-flex" role="search">
      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <div class="container">
    <h1 class="display-5 fw-bold">Contact Us</h1>
    <p class="lead">We would love to hear from you! Please fill out the form below.</p>
  </div>
</section>

<!-- Contact Form & Info -->
<section class="py-5">
  <div class="container">
    <div class="row">
      <!-- Contact Form -->
      <div class="col-md-6 mb-4">
        <form>
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Your Mobile No.</label>
            <input type="number" id="mobno" class="form-control" placeholder="Enter your email" required />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Your Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Your Message</label>
            <textarea id="message" class="form-control" rows="5" placeholder="Write your message..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="col-md-6">
        <div class="contact-info">
          <h4>Get in Touch</h4>
          <p><strong>Address:</strong> 484 Rajiv Nagar, Patna, Bihar, India</p>
          <p><strong>Email:</strong> saurabh30032023@gmail.com</p>
          <p><strong>Phone:</strong> +91 9341327650</p>
          <hr>
          <h5>Follow us</h5>
          <i class="fa-brands fa-facebook"></i>
          <a style="color: black; text-decoration: none;" href="https://www.facebook.com/share/1BrgrG4bfD/" class="me-2">Facebook</a>
          <i class="fa-brands fa-square-instagram"></i>
          <a style="color: black; text-decoration: none;" href="https://www.instagram.com/saurabh3002023?igsh=ZzFwcTBhdmV1M3Rx" class="me-2">Instagram</a>
          <i class="fa-brands fa-linkedin"></i>
          <a style="color: black; text-decoration: none;" href="https://www.linkedin.com/in/saurabh-kumar-003578338?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app">LinkedIn</a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Map Section (Optional) -->
<section class="pb-5">
  <div class="container">
    <div class="ratio ratio-16x9">
      <iframe
        src="https://maps.google.com/maps?q=patna&t=&z=13&ie=UTF8&iwloc=&output=embed"
        style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer text-center">
  <div class="container">
    <p class="mb-0">&copy; 2025 MyWebsite. All rights reserved.</p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
